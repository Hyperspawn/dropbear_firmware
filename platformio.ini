; PlatformIO Project Configuration File
; Dropbear Robot Firmware — ESP32 CAN Bus Controller
;
; Per-limb build environments: select the LIMB environment matching the
; physical board being flashed (see docs/can_config.md for limb topology).

[env]
platform = espressif32
framework = arduino
lib_deps =
    miwagner/ESP32CAN@^0.0.1
    bblanchon/ArduinoJson@^7.0.0
monitor_speed = 115200
board_build.partitions = default.csv
build_flags =
    -DCORE_DEBUG_LEVEL=0

; ─── Board variants ──────────────────────────────────────────────────────────
; Primary target: ESP32-DEVKITC-V4 (WROOM-32 module)
; Alternate target: ESP32-WROVER (for psram builds)

[env:left_arm]
board = esp32dev
build_flags = ${env.build_flags} -DLIMB_ID=0 -DLIMB_NAME='"left_arm"' -DCAN_NODE_ID=0x10

[env:right_arm]
board = esp32dev
build_flags = ${env.build_flags} -DLIMB_ID=1 -DLIMB_NAME='"right_arm"' -DCAN_NODE_ID=0x11

[env:left_leg]
board = esp32dev
build_flags = ${env.build_flags} -DLIMB_ID=2 -DLIMB_NAME='"left_leg"' -DCAN_NODE_ID=0x12

[env:right_leg]
board = esp32dev
build_flags = ${env.build_flags} -DLIMB_ID=3 -DLIMB_NAME='"right_leg"' -DCAN_NODE_ID=0x13

[env:head]
board = esp32dev
build_flags = ${env.build_flags} -DLIMB_ID=4 -DLIMB_NAME='"head"' -DCAN_NODE_ID=0x14

[env:torso]
board = esp32dev
build_flags = ${env.build_flags} -DLIMB_ID=5 -DLIMB_NAME='"torso"' -DCAN_NODE_ID=0x15

; ─── CI build environment (builds all limbs sequentially) ────────────────────
[env:ci]
board = esp32dev
build_flags = ${env.build_flags} -DLIMB_ID=0 -DLIMB_NAME='"ci_test"' -DCAN_NODE_ID=0x00
